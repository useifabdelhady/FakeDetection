 <style>
  .field-error { color: #E74C3C; font-size: 12px; margin-top: 4px; display: none; align-items: center; gap: 4px; animation: fadeIn 0.2s ease; }
  .field-error.show { display: flex; }
  .field-error svg { width: 14px; height: 14px; flex-shrink: 0; }
  .input-error { border-color: #E74C3C !important; }
  .input-success { border-color: #2ECC71 !important; }
  .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 0; }
  .password-toggle:hover { color: #6B7280; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
  .shake { animation: shake 0.4s ease; }
  .btn-loading { position: relative; pointer-events: none; }
  .btn-loading .btn-spinner { display: inline-block; }
  .btn-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script src="js/api.js"></script>
<script>
(function() {
  const form = document.getElementById("signinForm");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  // Add error message elements under each field
  function addErrorEl(input, id) {
    const err = document.createElement('div');
    err.id = id;
    err.className = 'field-error';
    err.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span></span>';
    input.closest('div.relative').parentElement.appendChild(err);
    return err;
  }
  const emailErr = addErrorEl(emailInput, 'emailError');
  const pwdErr = addErrorEl(passwordInput, 'pwdError');

  // Add password toggle button
  const pwdWrapper = passwordInput.closest('div.relative');
  const toggle = document.createElement('button');
  toggle.type = 'button';
  toggle.className = 'password-toggle';
  toggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  toggle.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    toggle.innerHTML = isHidden
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  });
  pwdWrapper.style.position = 'relative';
  passwordInput.style.paddingRight = '40px';
  pwdWrapper.appendChild(toggle);

  function showError(el, msg) { el.querySelector('span').textContent = msg; el.classList.add('show'); }
  function hideError(el) { el.classList.remove('show'); }

  function validateEmail() {
    const v = emailInput.value.trim();
    if (!v) { showError(emailErr, 'Email address is required'); emailInput.classList.add('input-error'); emailInput.classList.remove('input-success'); return false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { showError(emailErr, 'Please enter a valid email address'); emailInput.classList.add('input-error'); emailInput.classList.remove('input-success'); return false; }
    hideError(emailErr); emailInput.classList.remove('input-error'); emailInput.classList.add('input-success'); return true;
  }

  function validatePassword() {
    const v = passwordInput.value;
    if (!v) { showError(pwdErr, 'Password is required'); passwordInput.classList.add('input-error'); passwordInput.classList.remove('input-success'); return false; }
    if (v.length < 6) { showError(pwdErr, 'Password must be at least 6 characters'); passwordInput.classList.add('input-error'); passwordInput.classList.remove('input-success'); return false; }
    hideError(pwdErr); passwordInput.classList.remove('input-error'); passwordInput.classList.add('input-success'); return true;
  }

  emailInput.addEventListener('blur', validateEmail);
  emailInput.addEventListener('input', () => { if (emailInput.classList.contains('input-error')) validateEmail(); });
  passwordInput.addEventListener('blur', validatePassword);
  passwordInput.addEventListener('input', () => { if (passwordInput.classList.contains('input-error')) validatePassword(); });

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const emailOk = validateEmail();
    const pwdOk = validatePassword();
    if (!emailOk || !pwdOk) {
      form.classList.add('shake');
      setTimeout(() => form.classList.remove('shake'), 400);
      return;
    }
    const btn = this.querySelector('button[type="submit"]');
    const origHTML = btn.innerHTML;
    btn.innerHTML = '<span class="btn-spinner" style="display:inline-block"></span> Signing In...';
    btn.classList.add('btn-loading');
    btn.disabled = true;
    try {
      await API.login(emailInput.value.trim(), passwordInput.value);
      window.location.href = "dashboard.html";
    } catch (err) {
      window.showSnackbar("Sign in failed: " + err.message, 'error');
      btn.innerHTML = origHTML;
      btn.classList.remove('btn-loading');
      btn.disabled = false;
      form.classList.add('shake');
      setTimeout(() => form.classList.remove('shake'), 400);
    }
  });
})();
</script>

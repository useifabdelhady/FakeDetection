<html lang="en"><head>
    <meta charset="utf-8">
    <title>Change Password — TruthLens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Change your TruthLens account password.">
    <link rel="stylesheet" href="css/Style.css">
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%230A2540" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>'>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F5F7FA; min-height: 100vh; }

      .cp-header { background: #fff; border-bottom: 1px solid #E5E7EB; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
      .cp-header-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
      .cp-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #0A2540; font-size: 20px; font-weight: 700; }
      .cp-nav { display: flex; align-items: center; gap: 24px; }
      .cp-nav a { color: #0A2540; text-decoration: none; font-size: 14px; transition: opacity .2s; }
      .cp-nav a:hover { opacity: .7; }

      .cp-container { max-width: 520px; margin: 60px auto; padding: 0 20px; }
      .cp-back { display: inline-flex; align-items: center; gap: 6px; color: #0A2540; text-decoration: none; font-size: 14px; font-weight: 500; margin-bottom: 24px; transition: opacity .2s; }
      .cp-back:hover { opacity: .7; }

      .cp-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 40px; }
      .cp-card h1 { font-size: 24px; font-weight: 700; color: #0A2540; margin-bottom: 8px; }
      .cp-card p.subtitle { font-size: 14px; color: #6B7280; margin-bottom: 32px; }

      .cp-field { margin-bottom: 24px; position: relative; }
      .cp-field label { display: block; font-size: 13px; font-weight: 600; color: #0A2540; margin-bottom: 8px; }
      .cp-field input { width: 100%; padding: 12px 44px 12px 16px; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 15px; color: #0A2540; background: #F9FAFB; outline: none; transition: border-color .2s, box-shadow .2s; }
      .cp-field input:focus { border-color: #0A2540; box-shadow: 0 0 0 3px rgba(10,37,64,.1); background: #fff; }
      .cp-toggle { position: absolute; right: 14px; top: 36px; cursor: pointer; color: #9CA3AF; background: none; border: none; padding: 4px; transition: color .2s; }
      .cp-toggle:hover { color: #0A2540; }

      .cp-strength { height: 4px; border-radius: 2px; background: #E5E7EB; margin-top: 8px; overflow: hidden; }
      .cp-strength-bar { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
      .cp-strength-text { font-size: 12px; color: #6B7280; margin-top: 4px; }

      .cp-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; }
      .cp-btn { padding: 12px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
      .cp-btn-cancel { background: transparent; color: #6B7280; border: 2px solid #E5E7EB; }
      .cp-btn-cancel:hover { background: #F5F7FA; }
      .cp-btn-save { background: #0A2540; color: #fff; }
      .cp-btn-save:hover { background: #0A2540dd; }
      .cp-btn-save:disabled { opacity: .6; cursor: not-allowed; }

      .cp-icon { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #0A2540, #0A2540cc); display: flex; align-items: center; justify-content: center; color: #fff; margin: 0 auto 24px; }

      .cp-requirements { background: #F9FAFB; border-radius: 10px; padding: 16px; margin-bottom: 24px; }
      .cp-requirements h4 { font-size: 12px; font-weight: 600; color: #0A2540; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
      .cp-req-item { font-size: 13px; color: #9CA3AF; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; transition: color .2s; }
      .cp-req-item.met { color: #2ECC71; }
      .cp-req-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #D1D5DB; transition: background .2s; }
      .cp-req-item.met .dot { background: #2ECC71; }
    </style>
</head>
<body>

<!-- Header -->
<header class="cp-header">
  <div class="cp-header-inner">
    <a class="cp-logo" href="TruthLens.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
      TruthLens
    </a>
    <nav class="cp-nav">
      <a href="services.html">Services</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profile</a>
    </nav>
  </div>
</header>

<!-- Main Content -->
<div class="cp-container">
  <a href="profile.html" class="cp-back">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Back to Profile
  </a>

  <div class="cp-card">
    <div class="cp-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Change Password</h1>
    <p class="subtitle">Enter your current password and choose a new one.</p>

    <div class="cp-field">
      <label for="currentPwd">Current Password</label>
      <input type="password" id="currentPwd" placeholder="Enter current password" autocomplete="current-password">
      <button class="cp-toggle" onclick="togglePwd('currentPwd', this)" type="button" aria-label="Toggle password visibility">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="cp-field">
      <label for="newPwd">New Password</label>
      <input type="password" id="newPwd" placeholder="Enter new password" autocomplete="new-password">
      <button class="cp-toggle" onclick="togglePwd('newPwd', this)" type="button" aria-label="Toggle password visibility">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <div class="cp-strength"><div class="cp-strength-bar" id="strengthBar"></div></div>
      <div class="cp-strength-text" id="strengthText"></div>
    </div>

    <div class="cp-field">
      <label for="confirmPwd">Confirm New Password</label>
      <input type="password" id="confirmPwd" placeholder="Re-enter new password" autocomplete="new-password">
      <button class="cp-toggle" onclick="togglePwd('confirmPwd', this)" type="button" aria-label="Toggle password visibility">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="cp-requirements">
      <h4>Password Requirements</h4>
      <div class="cp-req-item" id="reqLen"><span class="dot"></span> At least 8 characters</div>
      <div class="cp-req-item" id="reqUpper"><span class="dot"></span> One uppercase letter</div>
      <div class="cp-req-item" id="reqLower"><span class="dot"></span> One lowercase letter</div>
      <div class="cp-req-item" id="reqNum"><span class="dot"></span> One number</div>
      <div class="cp-req-item" id="reqSpecial"><span class="dot"></span> One special character</div>
    </div>

    <div class="cp-actions">
      <button class="cp-btn cp-btn-cancel" onclick="window.location.href='profile.html'">Cancel</button>
      <button class="cp-btn cp-btn-save" id="saveBtn">Update Password</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  if (!API.isLoggedIn()) { window.location.href = "sign_in.html"; }

  // Toggle password visibility
  function togglePwd(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.style.color = isPassword ? '#0A2540' : '#9CA3AF';
  }

  // Password strength + requirements
  const newPwdInput = document.getElementById('newPwd');
  const strengthBar = document.getElementById('strengthBar');
  const strengthText = document.getElementById('strengthText');

  newPwdInput.addEventListener('input', () => {
    const val = newPwdInput.value;
    let score = 0;
    const checks = {
      reqLen: val.length >= 8,
      reqUpper: /[A-Z]/.test(val),
      reqLower: /[a-z]/.test(val),
      reqNum: /[0-9]/.test(val),
      reqSpecial: /[^A-Za-z0-9]/.test(val),
    };

    Object.entries(checks).forEach(([id, met]) => {
      const el = document.getElementById(id);
      if (met) { el.classList.add('met'); score++; } 
      else { el.classList.remove('met'); }
    });

    const pct = (score / 5) * 100;
    strengthBar.style.width = pct + '%';
    if (score <= 1) { strengthBar.style.background = '#E74C3C'; strengthText.textContent = 'Weak'; strengthText.style.color = '#E74C3C'; }
    else if (score <= 3) { strengthBar.style.background = '#F39C12'; strengthText.textContent = 'Medium'; strengthText.style.color = '#F39C12'; }
    else if (score <= 4) { strengthBar.style.background = '#3498DB'; strengthText.textContent = 'Good'; strengthText.style.color = '#3498DB'; }
    else { strengthBar.style.background = '#2ECC71'; strengthText.textContent = 'Strong'; strengthText.style.color = '#2ECC71'; }

    if (!val) { strengthText.textContent = ''; strengthBar.style.width = '0'; }
  });

  // Save handler
  document.getElementById('saveBtn').addEventListener('click', async () => {
    const cur = document.getElementById('currentPwd').value;
    const nw = document.getElementById('newPwd').value;
    const conf = document.getElementById('confirmPwd').value;

    if (!cur) return window.showSnackbar("Enter your current password", "warning");
    if (!nw) return window.showSnackbar("Enter a new password", "warning");
    if (nw.length < 8) return window.showSnackbar("Password must be at least 8 characters", "warning");
    if (nw !== conf) return window.showSnackbar("Passwords don't match", "warning");

    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Updating...';
    btn.disabled = true;

    try {
      await API.changePassword(cur, nw);
      window.showSnackbar("Password changed successfully!", "success");
      setTimeout(() => window.location.href = 'profile.html', 1200);
    } catch (e) {
      window.showSnackbar("Failed: " + (e.message || "Unknown error"), "error");
    }
    btn.textContent = 'Update Password';
    btn.disabled = false;
  });
</script>

</body></html>

# ============================================================
# Netlify Configuration for TruthLens Frontend
# ============================================================

[build]
  # The frontend is plain HTML/CSS/JS — no build step needed
  publish = "frontend/"

# ─── Redirect rules ──────────────────────────────────────────
# 404 fallback: only serve Truthlens.html for routes that don't match a real file
[[redirects]]
  from = "/*"
  to = "/TruthLens.html"
  status = 404

# ─── Security Headers ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
